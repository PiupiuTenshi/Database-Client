# SQL Server test DB cho Open DB Nexus (chỉ dùng local/manual — CI dùng mock).
# Chạy:   docker compose -f test/docker/docker-compose.sqlserver.yml up -d
# Dừng:   docker compose -f test/docker/docker-compose.sqlserver.yml down -v
# Sau khi container "healthy", chạy seed thủ công:
#   docker exec -i open-db-nexus-mssql /opt/mssql-tools18/bin/sqlcmd \
#     -S localhost -U sa -P 'Strong!Passw0rd' -C -No < test/docker/seed-sqlserver.sql
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: open-db-nexus-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Strong!Passw0rd"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Strong!Passw0rd' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
