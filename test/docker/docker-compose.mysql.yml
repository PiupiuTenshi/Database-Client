# MySQL test DB cho Open DB Nexus (chỉ dùng local/manual — CI dùng mock).
# Chạy:   docker compose -f test/docker/docker-compose.mysql.yml up -d
# Dừng:   docker compose -f test/docker/docker-compose.mysql.yml down -v
services:
  mysql:
    image: mysql:8.4
    container_name: open-db-nexus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    volumes:
      - ./seed-mysql.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql"]
      interval: 5s
      timeout: 3s
      retries: 10
